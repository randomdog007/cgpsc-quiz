<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Web site created using create-react-app"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <!-- Primary Meta -->
    <title>CGPSC Quiz | State Civil Services Prep Portal</title>
    <meta name="description" content="Practice for CGPSC Prelims with subject-wise quizzes, PYQs, analytics and leaderboard. Paper 1 & Paper 2 covered." />

    <!-- Open Graph (WhatsApp, Telegram, Facebook) -->
    <meta property="og:title" content="CGPSC Quiz — Free Prelims Practice" />
    <meta property="og:description" content="20 subjects · 83 topics · PYQ sets. Track your progress and compete on the leaderboard." />
    <meta property="og:url" content="https://cgpsc-quiz.pages.dev" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://cgpsc-quiz.pages.dev/og-image.png" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CGPSC Quiz — Free Prelims Practice" />
    <meta name="twitter:description" content="20 subjects · 83 topics · PYQ sets. Track your progress and compete on the leaderboard." />
    <meta name="twitter:image" content="https://cgpsc-quiz.pages.dev/og-image.png" />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
